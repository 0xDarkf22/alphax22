<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaX | Blog</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        :root { --bg-color: #0a0a0a; --bg-alt: #111; --card-bg: #151515; --text-main: #f8fafc; --text-muted: #a1a1aa; --accent-color: #0d9488; --border-color: #27272a; }
        [data-theme="light"] { --bg-color: #fff; --bg-alt: #f8f9fa; --card-bg: #fff; --text-main: #1f2937; --text-muted: #4b5563; --border-color: #e5e7eb; }
        body { font-family: 'Inter', sans-serif; color: var(--text-main); background: var(--bg-color); margin: 0; padding: 0; transition: 0.3s; }
        .container { max-width: 780px; margin: 0 auto; padding: 2rem 1rem; }
        .post-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 1.5rem; margin-bottom: 2rem; transition: 0.3s; }
        .post-card:hover { border-color: var(--accent-color); }
        .post-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; }
        .post-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--accent-color); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; }
        .post-title { font-size: 1.3rem; font-weight: 700; cursor: pointer; }
        .post-title:hover { color: var(--accent-color); }
        .post-excerpt { color: var(--text-muted); line-height: 1.6; }
        .post-image { border-radius: 12px; overflow: hidden; margin: 0.75rem 0; }
        .post-image img { width: 100%; max-height: 400px; object-fit: cover; display: block; }
        .post-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin: 0.5rem 0; }
        .post-tag { font-size: 0.7rem; padding: 0.15rem 0.6rem; border-radius: 4px; background: rgba(13,148,136,0.08); color: var(--accent-color); border: 1px solid rgba(13,148,136,0.15); }
        .post-actions { display: flex; align-items: center; gap: 1rem; padding-top: 0.75rem; border-top: 1px solid var(--border-color); margin-top: 0.75rem; }
        .post-actions button { background: none; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; gap: 0.4rem; padding: 0.4rem 0.8rem; border-radius: 8px; font-family: inherit; transition: 0.2s; }
        .post-actions button:hover { background: rgba(13,148,136,0.08); }
        .post-actions button.liked { color: #ef4444; }
        .post-actions button.liked i { color: #ef4444; }
        .filter-btn { padding: 0.4rem 1rem; background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); border-radius: 20px; font-family: inherit; cursor: pointer; transition: 0.3s; }
        .filter-btn:hover, .filter-btn.active { border-color: var(--accent-color); color: var(--accent-color); background: rgba(13,148,136,0.08); }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid var(--border-color); border-top-color: var(--accent-color); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 2rem auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .nav-container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; height: 80px; }
        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-link { font-weight: 600; color: var(--text-muted); text-decoration: none; }
        .nav-link:hover, .nav-link.active { color: var(--accent-color); }
        .logo a { font-size: 1.5rem; font-weight: 700; color: var(--text-main); text-decoration: none; }
        .hamburger { display: none; font-size: 1.5rem; cursor: pointer; }
        @media (max-width: 768px) { .nav-links { display: none; } .hamburger { display: block; } }
        footer { background: #000; padding: 2rem; text-align: center; color: var(--text-muted); }
        .empty-state { text-align: center; padding: 3rem 2rem; color: var(--text-muted); }
        .empty-state i { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
    </style>
</head>
<body>
    <header>
        <nav class="nav-container">
            <div class="logo"><a href="index.html">0xAlpha22</a></div>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html#home" class="nav-link">Home</a></li>
                <li><a href="index.html#about" class="nav-link">About</a></li>
                <li><a href="projects.html" class="nav-link">Projects</a></li>
                <li><a href="https://alphalabs-22.web.app/index.html" class="nav-link">Writeups</a></li>
                <li><a href="certificates.html" class="nav-link">Certificates</a></li>
                <li><a href="blog.html" class="nav-link active">Blog</a></li>
                <li><a href="resume.html" class="nav-link">Resume</a></li>
                <li><a href="index.html#contact" class="nav-link">Contact</a></li>
            </ul>
            <div class="nav-actions">
                <button id="theme-toggle"><i class="fas fa-moon"></i></button>
                <div class="hamburger" id="hamburger"><i class="fas fa-bars"></i></div>
            </div>
        </nav>
    </header>

    <main>
        <div class="container">
            <h1>Posts & Research</h1>
            <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin:1rem 0;">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="ctf">CTF</button>
                <button class="filter-btn" data-filter="bugbounty">Bug Bounty</button>
                <button class="filter-btn" data-filter="research">Research</button>
                <button class="filter-btn" data-filter="tools">Tools</button>
                <button class="filter-btn" data-filter="misc">Misc</button>
            </div>
            <div id="posts-feed"><div class="loading-spinner"></div></div>
        </div>
    </main>

    <footer><p>© 2026 AlphaX. All rights reserved.</p></footer>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { 
        getFirestore, collection, doc, updateDoc, increment, 
        query, orderBy, onSnapshot 
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAeYGzHvgOC8mQGI-5dc16I9bBRez_LAcc",
        authDomain: "alphax22.firebaseapp.com",
        projectId: "alphax22",
        storageBucket: "alphax22.firebasestorage.app",
        messagingSenderId: "564241919435",
        appId: "1:564241919435:web:a0146fd9a65f32a1125a4e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const feed = document.getElementById('posts-feed');
    let currentFilter = 'all';

    // ── BUILD POST CARD ──
    function buildPostCard(post, id) {
        const isLiked = JSON.parse(localStorage.getItem('liked_posts') || '[]').includes(id);
        
        const card = document.createElement('div');
        card.className = 'post-card';
        card.dataset.category = post.category || 'misc';

        card.innerHTML = `
            <div class="post-header">
                <div class="post-avatar">A</div>
                <div>
                    <div style="font-weight:700;">AlphaX</div>
                    <div style="color:var(--text-muted);font-size:0.8rem;">${post.category || 'Misc'}</div>
                </div>
            </div>
            <div class="post-title" onclick="window.location.href='blog-post.html?id=${id}'">${post.title}</div>
            <div class="post-excerpt">${post.excerpt || post.content?.substring(0, 150) + '...' || ''}</div>
            ${post.imageUrl ? `<div class="post-image"><img src="${post.imageUrl}" alt="${post.title}" loading="lazy"></div>` : ''}
            <div class="post-tags">${(post.tags || []).map(t => `<span class="post-tag">${t}</span>`).join('')}</div>
            <div class="post-actions">
                <button class="like-btn ${isLiked ? 'liked' : ''}" data-id="${id}">
                    <i class="${isLiked ? 'fas' : 'far'} fa-heart"></i>
                    <span class="like-count">${post.likes || 0}</span>
                </button>
                <button onclick="window.location.href='blog-post.html?id=${id}'">
                    <i class="far fa-comment"></i> ${post.commentCount || 0}
                </button>
                <button onclick="navigator.clipboard.writeText('https://alphax22.web.app/blog-post.html?id=${id}')">
                    <i class="fas fa-share-alt"></i>
                </button>
            </div>
        `;

        // ── LIKE / DISLIKE ──
        const likeBtn = card.querySelector('.like-btn');
        
        likeBtn.addEventListener('click', async function(e) {
            e.stopPropagation();
            const id = this.dataset.id;
            const likedPosts = JSON.parse(localStorage.getItem('liked_posts') || '[]');
            const isCurrentlyLiked = likedPosts.includes(id);
            const countSpan = this.querySelector('.like-count');
            const icon = this.querySelector('i');

            if (isCurrentlyLiked) {
                // ── DISLIKE ──
                const newLiked = likedPosts.filter(p => p !== id);
                localStorage.setItem('liked_posts', JSON.stringify(newLiked));
                
                this.classList.remove('liked');
                icon.className = 'far fa-heart';
                countSpan.textContent = parseInt(countSpan.textContent) - 1;
                
                try {
                    await updateDoc(doc(db, 'posts', id), { likes: increment(-1) });
                    console.log("✅ Disliked");
                } catch (err) {
                    console.error("❌ Error:", err);
                    // Revert
                    this.classList.add('liked');
                    icon.className = 'fas fa-heart';
                    countSpan.textContent = parseInt(countSpan.textContent) + 1;
                    likedPosts.push(id);
                    localStorage.setItem('liked_posts', JSON.stringify(likedPosts));
                }
            } else {
                // ── LIKE ──
                likedPosts.push(id);
                localStorage.setItem('liked_posts', JSON.stringify(likedPosts));
                
                this.classList.add('liked');
                icon.className = 'fas fa-heart';
                countSpan.textContent = parseInt(countSpan.textContent) + 1;
                
                try {
                    await updateDoc(doc(db, 'posts', id), { likes: increment(1) });
                    console.log("✅ Liked");
                } catch (err) {
                    console.error("❌ Error:", err);
                    // Revert
                    this.classList.remove('liked');
                    icon.className = 'far fa-heart';
                    countSpan.textContent = parseInt(countSpan.textContent) - 1;
                    const revertLiked = JSON.parse(localStorage.getItem('liked_posts') || '[]');
                    const index = revertLiked.indexOf(id);
                    if (index > -1) revertLiked.splice(index, 1);
                    localStorage.setItem('liked_posts', JSON.stringify(revertLiked));
                }
            }
        });

        return card;
    }

    // ── LOAD POSTS WITH REAL-TIME SYNC ──
    function loadPosts() {
        const q = query(collection(db, 'posts'), orderBy('createdAt', 'desc'));
        
        onSnapshot(q, (snapshot) => {
            feed.innerHTML = '';
            
            if (snapshot.empty) {
                feed.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-terminal"></i>
                        <p>No posts yet. Check back soon.</p>
                    </div>
                `;
                return;
            }

            snapshot.forEach(doc => {
                const post = doc.data();
                const id = doc.id;
                const card = buildPostCard(post, id);
                feed.appendChild(card);
            });

            applyFilter();
        });
    }

    // ── FILTER ──
    function applyFilter() {
        document.querySelectorAll('.post-card').forEach(card => {
            const category = card.dataset.category || 'misc';
            card.style.display = (currentFilter === 'all' || category === currentFilter) ? 'block' : 'none';
        });
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentFilter = this.dataset.filter;
            applyFilter();
        });
    });

    // ── THEME TOGGLE ──
    const themeToggle = document.getElementById('theme-toggle');
    const html = document.documentElement;
    const saved = localStorage.getItem('theme') || 'dark';
    html.setAttribute('data-theme', saved);
    themeToggle.innerHTML = saved === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    themeToggle.addEventListener('click', () => {
        const cur = html.getAttribute('data-theme');
        const next = cur === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        themeToggle.innerHTML = next === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    });

    // ── MOBILE NAV ──
    document.getElementById('hamburger').addEventListener('click', () => {
        document.getElementById('nav-links').classList.toggle('active');
    });

    // ── INIT ──
    loadPosts();
    </script>
</body>
</html>
