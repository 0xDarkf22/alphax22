<!DOCTYPE html>
<html>
<head>
    <title>Blog Test</title>
</head>
<body>
    <h1>Blog Posts</h1>
    <div id="posts-feed">Loading...</div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAeYGzHvgOC8mQGI-5dc16I9bBRez_LAcc",
        authDomain: "alphax22.firebaseapp.com",
        projectId: "alphax22",
        storageBucket: "alphax22.firebasestorage.app",
        messagingSenderId: "564241919435",
        appId: "1:564241919435:web:a0146fd9a65f32a1125a4e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadPosts() {
        try {
            const snapshot = await getDocs(collection(db, 'posts'));
            const feed = document.getElementById('posts-feed');
            
            if (snapshot.empty) {
                feed.innerHTML = '<p>No posts found in Firestore.</p>';
                return;
            }
            
            let html = '';
            snapshot.forEach(doc => {
                const post = doc.data();
                html += `<div style="border:1px solid #333;padding:10px;margin:10px 0;">
                    <h3>${post.title}</h3>
                    <p>${post.excerpt || 'No excerpt'}</p>
                    <small>Category: ${post.category || 'Misc'}</small>
                </div>`;
            });
            
            feed.innerHTML = html;
        } catch (err) {
            document.getElementById('posts-feed').innerHTML = `<p style="color:red;">Error: ${err.message}</p>`;
            console.error(err);
        }
    }

    loadPosts();
    </script>
</body>
</html>
