<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaX | Blog</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        :root { --bg-color: #0a0a0a; --bg-alt: #111; --card-bg: #151515; --text-main: #f8fafc; --text-muted: #a1a1aa; --accent-color: #0d9488; --border-color: #27272a; }
        [data-theme="light"] { --bg-color: #fff; --bg-alt: #f8f9fa; --card-bg: #fff; --text-main: #1f2937; --text-muted: #4b5563; --border-color: #e5e7eb; }
        body { font-family: 'Inter', sans-serif; color: var(--text-main); background: var(--bg-color); margin: 0; padding: 0; transition: 0.3s; }

        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1rem; }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 80px;
        }
        .logo a { font-size: 1.5rem; font-weight: 700; color: var(--text-main); text-decoration: none; }
        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-link { font-weight: 600; color: var(--text-muted); text-decoration: none; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { color: var(--accent-color); }
        .nav-actions { display: flex; align-items: center; gap: 1.5rem; }
        #theme-toggle { background: none; border: none; color: var(--text-main); font-size: 1.2rem; cursor: pointer; }
        .hamburger { display: none; font-size: 1.5rem; cursor: pointer; color: var(--text-main); }
        @media (max-width: 768px) { .nav-links { display: none; } .hamburger { display: block; } }

        .blog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .blog-header h1 { font-size: 2.2rem; }
        .blog-header p { color: var(--text-muted); }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            align-items: center;
        }
        .filter-buttons { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .filter-btn {
            padding: 0.4rem 1rem;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            border-radius: 20px;
            font-family: inherit;
            cursor: pointer;
            transition: 0.3s;
        }
        .filter-btn:hover, .filter-btn.active {
            border-color: var(--accent-color);
            color: var(--accent-color);
            background: rgba(13,148,136,0.08);
        }
        .sort-options { display: flex; gap: 0.5rem; margin-left: auto; }
        .sort-btn {
            padding: 0.3rem 1rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            border-radius: 8px;
            font-family: inherit;
            cursor: pointer;
            transition: 0.3s;
        }
        .sort-btn:hover, .sort-btn.active {
            border-color: var(--accent-color);
            color: var(--accent-color);
            background: rgba(13,148,136,0.1);
        }

        .pinned-post {
            background: var(--card-bg);
            border: 2px solid var(--accent-color);
            border-radius: 16px;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }
        .pinned-post:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(13,148,136,0.15);
        }
        .pinned-post:active { transform: none !important; }
        .pinned-post .pinned-badge {
            position: absolute;
            top: -10px;
            right: 20px;
            background: var(--accent-color);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.2rem 0.8rem;
            border-radius: 12px;
            letter-spacing: 0.5px;
        }
        .pinned-post .post-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }
        .pinned-post .post-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            flex-shrink: 0;
        }
        .pinned-post .post-title {
            font-size: 1.5rem;
            font-weight: 700;
            cursor: pointer;
        }
        .pinned-post .post-title:hover { color: var(--accent-color); }
        .pinned-post .post-excerpt { color: var(--text-muted); line-height: 1.6; }
        .pinned-post .post-image {
            border-radius: 12px;
            overflow: hidden;
            margin: 0.75rem 0;
        }
        .pinned-post .post-image img {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            display: block;
        }
        .pinned-post .post-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin: 0.5rem 0;
        }
        .pinned-post .post-tag {
            font-size: 0.7rem;
            padding: 0.15rem 0.6rem;
            border-radius: 4px;
            background: rgba(13,148,136,0.08);
            color: var(--accent-color);
            border: 1px solid rgba(13,148,136,0.15);
        }
        .pinned-post .post-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border-color);
            margin-top: 0.75rem;
        }
        .pinned-post .post-actions button {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-family: inherit;
            transition: 0.2s;
        }
        .pinned-post .post-actions button:hover { background: rgba(13,148,136,0.08); }
        .pinned-post .post-actions button.liked { color: #ef4444; }
        .pinned-post .post-actions button.liked i { color: #ef4444; }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .post-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            transition: 0.3s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }
        .post-card:hover {
            border-color: var(--accent-color);
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
        .post-card:active { transform: none !important; }
        .post-card .post-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }
        .post-card .post-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            flex-shrink: 0;
        }
        .post-card .post-title {
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            line-height: 1.4;
        }
        .post-card .post-title:hover { color: var(--accent-color); }
        .post-card .post-excerpt {
            color: var(--text-muted);
            line-height: 1.6;
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .post-card .post-image {
            border-radius: 12px;
            overflow: hidden;
            margin: 0.75rem 0;
        }
        .post-card .post-image img {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            display: block;
        }
        .post-card .post-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin: 0.5rem 0;
        }
        .post-card .post-tag {
            font-size: 0.7rem;
            padding: 0.15rem 0.6rem;
            border-radius: 4px;
            background: rgba(13,148,136,0.08);
            color: var(--accent-color);
            border: 1px solid rgba(13,148,136,0.15);
        }
        .post-card .post-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border-color);
            margin-top: 0.75rem;
        }
        .post-card .post-actions button {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-family: inherit;
            transition: 0.2s;
        }
        .post-card .post-actions button:hover { background: rgba(13,148,136,0.08); }
        .post-card .post-actions button.liked { color: #ef4444; }
        .post-card .post-actions button.liked i { color: #ef4444; }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.3rem;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }
        .pagination button {
            padding: 0.4rem 0.8rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
            min-width: 36px;
        }
        .pagination button:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }
        .pagination button.active {
            background: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
        }
        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 2rem auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-muted);
        }
        .empty-state i { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }

        footer {
            background: #000;
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
            margin-top: 2rem;
        }

        @media (max-width: 768px) {
            .controls { flex-direction: column; align-items: stretch; }
            .sort-options { margin-left: 0; }
            .posts-grid { grid-template-columns: 1fr; }
            .blog-header { flex-direction: column; align-items: flex-start; }
            .pinned-post { padding: 1rem; }
            .pinned-post .post-title { font-size: 1.2rem; }
        }
        @media (min-width: 769px) and (max-width: 1024px) {
            .posts-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (min-width: 1025px) {
            .posts-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>
    <header>
        <nav class="nav-container">
            <div class="logo"><a href="index.html">0xAlpha22</a></div>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html#home" class="nav-link">Home</a></li>
                <li><a href="index.html#about" class="nav-link">About</a></li>
                <li><a href="certificates.html" class="nav-link">Certificates</a></li>
                <li><a href="https://alphalabs-22.web.app/index.html" class="nav-link">Writeups</a></li>
                <li><a href="blog.html" class="nav-link active">Blog</a></li>
                <li><a href="resume.html" class="nav-link">Resume</a></li>
                <li><a href="index.html#contact" class="nav-link">Contact</a></li>
            </ul>
            <div class="nav-actions">
                <button id="theme-toggle"><i class="fas fa-moon"></i></button>
                <div class="hamburger" id="hamburger"><i class="fas fa-bars"></i></div>
            </div>
        </nav>
    </header>

    <main>
        <div class="container">
            <div class="blog-header">
                <div>
                    <h1>Posts & Research</h1>
                    <p>Security research, CTF insights, bug bounty notes</p>
                </div>
            </div>

            <div class="controls">
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="ctf">CTF</button>
                    <button class="filter-btn" data-filter="bugbounty">Bug Bounty</button>
                    <button class="filter-btn" data-filter="research">Research</button>
                    <button class="filter-btn" data-filter="tools">Tools</button>
                    <button class="filter-btn" data-filter="misc">Misc</button>
                </div>
                <div class="sort-options">
                    <button class="sort-btn active" data-sort="recent">📅 Recent</button>
                    <button class="sort-btn" data-sort="popular">🔥 Popular</button>
                </div>
            </div>

            <div id="posts-feed"><div class="loading-spinner"></div></div>
            <div class="pagination" id="pagination"></div>
        </div>
    </main>

    <footer><p>© 2026 AlphaX. All rights reserved.</p></footer>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { 
        getFirestore, collection, doc, updateDoc, increment, 
        query, orderBy, onSnapshot, getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAeYGzHvgOC8mQGI-5dc16I9bBRez_LAcc",
        authDomain: "alphax22.firebaseapp.com",
        projectId: "alphax22",
        storageBucket: "alphax22.firebasestorage.app",
        messagingSenderId: "564241919435",
        appId: "1:564241919435:web:a0146fd9a65f32a1125a4e",
        measurementId: "G-F6GW3R1WMP"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const feed = document.getElementById('posts-feed');
    const pagination = document.getElementById('pagination');

    let currentFilter = 'all';
    let currentSort = 'recent';
    let currentPage = 1;
    let totalPosts = 0;
    const POSTS_PER_PAGE = 6;
    let allPosts = [];
    let filteredPosts = [];
    let pinnedPost = null;
    const PINNED_TITLE = "Whoami - a 17-year old cybersecurity researcher";

    function buildPinnedPost(post, id) {
        const likedPosts = JSON.parse(localStorage.getItem('liked_posts') || '[]');
        const isLiked = likedPosts.includes(id);
        const likeCount = post.likes || 0;
        
        const div = document.createElement('div');
        div.className = 'pinned-post';
        div.dataset.category = post.category || 'misc';
        div.dataset.postId = id;

        div.innerHTML = `
            <span class="pinned-badge">📌 PINNED</span>
            <div class="post-header">
                <div class="post-avatar">A</div>
                <div>
                    <div style="font-weight:700;">AlphaX</div>
                    <div style="color:var(--text-muted);font-size:0.8rem;">${post.category || 'Misc'}</div>
                </div>
            </div>
            <div class="post-title" onclick="window.location.href='blog-post.html?id=${id}'">${post.title}</div>
            <div class="post-excerpt">${post.excerpt || post.content?.substring(0, 200) + '...' || ''}</div>
            ${post.imageUrl ? `<div class="post-image"><img src="${post.imageUrl}" alt="${post.title}" loading="lazy"></div>` : ''}
            <div class="post-tags">${(post.tags || []).map(t => `<span class="post-tag">${t}</span>`).join('')}</div>
            <div class="post-actions">
                <button class="like-btn ${isLiked ? 'liked' : ''}" data-id="${id}">
                    <i class="${isLiked ? 'fas' : 'far'} fa-heart"></i>
                    <span class="like-count">${likeCount}</span>
                </button>
                <button onclick="window.location.href='blog-post.html?id=${id}'">
                    <i class="far fa-comment"></i> ${post.commentCount || 0}
                </button>
                <button onclick="navigator.clipboard.writeText('https://alphax22.web.app/blog-post.html?id=${id}')">
                    <i class="fas fa-share-alt"></i>
                </button>
            </div>
        `;

        div.addEventListener('click', (e) => {
            if (!e.target.closest('button')) {
                window.location.href = `blog-post.html?id=${id}`;
            }
        });

        const likeBtn = div.querySelector('.like-btn');
        likeBtn.addEventListener('click', async function(e) {
            e.stopPropagation();
            const id = this.dataset.id;
            let likedPosts = JSON.parse(localStorage.getItem('liked_posts') || '[]');
            const isCurrentlyLiked = likedPosts.includes(id);

            if (isCurrentlyLiked) {
                likedPosts = likedPosts.filter(p => p !== id);
                localStorage.setItem('liked_posts', JSON.stringify(likedPosts));
                this.classList.remove('liked');
                this.querySelector('i').className = 'far fa-heart';
                await updateDoc(doc(db, 'posts', id), { likes: increment(-1) });
            } else {
                likedPosts.push(id);
                localStorage.setItem('liked_posts', JSON.stringify(likedPosts));
                this.classList.add('liked');
                this.querySelector('i').className = 'fas fa-heart';
                await updateDoc(doc(db, 'posts', id), { likes: increment(1) });
            }
        });

        return div;
    }

    function buildPostCard(post, id) {
        const likedPosts = JSON.parse(localStorage.getItem('liked_posts') || '[]');
        const isLiked = likedPosts.includes(id);
        const likeCount = post.likes || 0;
        
        const card = document.createElement('div');
        card.className = 'post-card';
        card.dataset.category = post.category || 'misc';
        card.dataset.postId = id;

        card.innerHTML = `
            <div class="post-header">
                <div class="post-avatar">A</div>
                <div>
                    <div style="font-weight:700;">AlphaX</div>
                    <div style="color:var(--text-muted);font-size:0.8rem;">${post.category || 'Misc'}</div>
                </div>
            </div>
            <div class="post-title" onclick="window.location.href='blog-post.html?id=${id}'">${post.title}</div>
            <div class="post-excerpt">${post.excerpt || post.content?.substring(0, 150) + '...' || ''}</div>
            ${post.imageUrl ? `<div class="post-image"><img src="${post.imageUrl}" alt="${post.title}" loading="lazy"></div>` : ''}
            <div class="post-tags">${(post.tags || []).map(t => `<span class="post-tag">${t}</span>`).join('')}</div>
            <div class="post-actions">
                <button class="like-btn ${isLiked ? 'liked' : ''}" data-id="${id}">
                    <i class="${isLiked ? 'fas' : 'far'} fa-heart"></i>
                    <span class="like-count">${likeCount}</span>
                </button>
                <button onclick="window.location.href='blog-post.html?id=${id}'">
                    <i class="far fa-comment"></i> ${post.commentCount || 0}
                </button>
                <button onclick="navigator.clipboard.writeText('https://alphax22.web.app/blog-post.html?id=${id}')">
                    <i class="fas fa-share-alt"></i>
                </button>
            </div>
        `;

        card.addEventListener('click', (e) => {
            if (!e.target.closest('button')) {
                window.location.href = `blog-post.html?id=${id}`;
            }
        });

        const likeBtn = card.querySelector('.like-btn');
        likeBtn.addEventListener('click', async function(e) {
            e.stopPropagation();
            const id = this.dataset.id;
            let likedPosts = JSON.parse(localStorage.getItem('liked_posts') || '[]');
            const isCurrentlyLiked = likedPosts.includes(id);

            if (isCurrentlyLiked) {
                likedPosts = likedPosts.filter(p => p !== id);
                localStorage.setItem('liked_posts', JSON.stringify(likedPosts));
                this.classList.remove('liked');
                this.querySelector('i').className = 'far fa-heart';
                await updateDoc(doc(db, 'posts', id), { likes: increment(-1) });
            } else {
                likedPosts.push(id);
                localStorage.setItem('liked_posts', JSON.stringify(likedPosts));
                this.classList.add('liked');
                this.querySelector('i').className = 'fas fa-heart';
                await updateDoc(doc(db, 'posts', id), { likes: increment(1) });
            }
        });

        return card;
    }

    let postsUnsub = null;

    function loadPosts() {
        const q = query(collection(db, 'posts'), orderBy('createdAt', 'desc'));
        
        if (postsUnsub) postsUnsub();
        postsUnsub = onSnapshot(q, (snapshot) => {
            allPosts = [];
            pinnedPost = null;

            snapshot.forEach(doc => {
                const post = { ...doc.data(), id: doc.id };
                if (post.title && post.title.trim() === PINNED_TITLE) {
                    pinnedPost = post;
                } else {
                    allPosts.push(post);
                }
            });

            applyFiltersAndSort();
        });
    }

    function applyFiltersAndSort() {
        filteredPosts = allPosts.filter(post => {
            if (currentFilter === 'all') return true;
            return (post.category || 'misc').toLowerCase() === currentFilter;
        });

        if (currentSort === 'popular') {
            filteredPosts.sort((a, b) => (b.likes || 0) - (a.likes || 0));
        } else {
            filteredPosts.sort((a, b) => {
                const dateA = a.createdAt ? a.createdAt.toDate().getTime() : 0;
                const dateB = b.createdAt ? b.createdAt.toDate().getTime() : 0;
                return dateB - dateA;
            });
        }

        totalPosts = filteredPosts.length;
        
        const maxPage = Math.ceil(totalPosts / POSTS_PER_PAGE);
        if (currentPage > maxPage && maxPage > 0) {
            currentPage = 1;
        }
        
        renderPage(currentPage);
        renderPagination();
    }

    function renderPage(page) {
        currentPage = page;
        const start = (page - 1) * POSTS_PER_PAGE;
        const end = start + POSTS_PER_PAGE;
        const pagePosts = filteredPosts.slice(start, end);

        feed.innerHTML = '';

        if (pinnedPost) {
            feed.appendChild(buildPinnedPost(pinnedPost, pinnedPost.id));
        }

        if (pagePosts.length === 0 && !pinnedPost) {
            feed.innerHTML = `<div class="empty-state"><i class="fas fa-terminal"></i><p>No posts found.</p></div>`;
            return;
        }

        if (pagePosts.length > 0) {
            const grid = document.createElement('div');
            grid.className = 'posts-grid';
            pagePosts.forEach(post => {
                grid.appendChild(buildPostCard(post, post.id));
            });
            feed.appendChild(grid);
        }
    }

    function renderPagination() {
        const totalPages = Math.ceil(totalPosts / POSTS_PER_PAGE);
        pagination.innerHTML = '';

        if (totalPages <= 1) return;

        const prevBtn = document.createElement('button');
        prevBtn.textContent = '‹';
        prevBtn.disabled = currentPage === 1;
        prevBtn.addEventListener('click', () => {
            if (currentPage > 1) renderPage(currentPage - 1);
            renderPagination();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        pagination.appendChild(prevBtn);

        let startPage = Math.max(1, currentPage - 2);
        let endPage = Math.min(totalPages, currentPage + 2);

        if (endPage - startPage < 4) {
            if (startPage > 1) startPage = Math.max(1, endPage - 4);
            if (endPage < totalPages) endPage = Math.min(totalPages, startPage + 4);
        }

        if (startPage > 1) {
            const firstBtn = document.createElement('button');
            firstBtn.textContent = '1';
            firstBtn.addEventListener('click', () => { renderPage(1); renderPagination(); window.scrollTo({ top: 0, behavior: 'smooth' }); });
            pagination.appendChild(firstBtn);
            if (startPage > 2) {
                const dots = document.createElement('button');
                dots.textContent = '…';
                dots.disabled = true;
                pagination.appendChild(dots);
            }
        }

        for (let i = startPage; i <= endPage; i++) {
            const btn = document.createElement('button');
            btn.textContent = i;
            if (i === currentPage) btn.classList.add('active');
            btn.addEventListener('click', () => { renderPage(i); renderPagination(); window.scrollTo({ top: 0, behavior: 'smooth' }); });
            pagination.appendChild(btn);
        }

        if (endPage < totalPages) {
            if (endPage < totalPages - 1) {
                const dots = document.createElement('button');
                dots.textContent = '…';
                dots.disabled = true;
                pagination.appendChild(dots);
            }
            const lastBtn = document.createElement('button');
            lastBtn.textContent = totalPages;
            lastBtn.addEventListener('click', () => { renderPage(totalPages); renderPagination(); window.scrollTo({ top: 0, behavior: 'smooth' }); });
            pagination.appendChild(lastBtn);
        }

        const nextBtn = document.createElement('button');
        nextBtn.textContent = '›';
        nextBtn.disabled = currentPage === totalPages;
        nextBtn.addEventListener('click', () => {
            if (currentPage < totalPages) renderPage(currentPage + 1);
            renderPagination();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        pagination.appendChild(nextBtn);
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentFilter = this.dataset.filter;
            currentPage = 1;
            applyFiltersAndSort();
        });
    });

    document.querySelectorAll('.sort-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentSort = this.dataset.sort;
            currentPage = 1;
            applyFiltersAndSort();
        });
    });

    const themeToggle = document.getElementById('theme-toggle');
    const html = document.documentElement;
    const saved = localStorage.getItem('theme') || 'dark';
    html.setAttribute('data-theme', saved);
    themeToggle.innerHTML = saved === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    themeToggle.addEventListener('click', () => {
        const cur = html.getAttribute('data-theme');
        const next = cur === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        themeToggle.innerHTML = next === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    });

    document.getElementById('hamburger').addEventListener('click', () => {
        document.getElementById('nav-links').classList.toggle('active');
    });

    loadPosts();
    </script>
</body>
</html>
