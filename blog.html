<style>
:root {
    --bg-color: #0a0a0a;
    --bg-alt: #111111;
    --card-bg: #151515;
    --text-main: #f8fafc;
    --text-muted: #a1a1aa;
    --accent-color: #0d9488;
    --border-color: #27272a;
}
[data-theme="light"] {
    --bg-color: #ffffff;
    --bg-alt: #f8f9fa;
    --card-bg: #ffffff;
    --text-main: #1f2937;
    --text-muted: #4b5563;
    --border-color: #e5e7eb;
}
body {
    font-family: 'Inter', sans-serif;
    color: var(--text-main);
    background-color: var(--bg-color);
    line-height: 1.6;
    transition: background-color 0.3s, color 0.3s;
    margin: 0;
    padding: 0;
}
.section-container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
.loading-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border-color);
    border-top-color: var(--accent-color);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 3rem auto;
}
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
.empty-state i { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
.post-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 1.5rem; margin-bottom: 2rem; transition: border-color 0.3s; }
.post-card:hover { border-color: var(--accent-color); }
.post-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; }
.post-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--accent-color); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 1.1rem; flex-shrink: 0; }
.post-author { font-weight: 700; color: var(--text-main); font-size: 0.95rem; }
.post-time { color: var(--text-muted); font-size: 0.8rem; }
.post-category-tag { font-size: 0.7rem; padding: 0.15rem 0.6rem; border-radius: 12px; background: rgba(13,148,136,0.15); color: var(--accent-color); border: 1px solid rgba(13,148,136,0.2); }
.post-title { font-size: 1.3rem; font-weight: 700; color: var(--text-main); margin: 0.5rem 0; cursor: pointer; }
.post-title:hover { color: var(--accent-color); }
.post-excerpt { color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 0.75rem; }
.post-image { border-radius: 12px; overflow: hidden; margin: 0.75rem 0; background: var(--bg-alt); cursor: pointer; }
.post-image img { width: 100%; max-height: 500px; object-fit: cover; display: block; }
.post-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin: 0.5rem 0; }
.post-tag { font-size: 0.7rem; padding: 0.15rem 0.6rem; border-radius: 4px; background: rgba(13,148,136,0.08); color: var(--accent-color); border: 1px solid rgba(13,148,136,0.15); }
.post-actions { display: flex; align-items: center; gap: 1.5rem; padding-top: 0.75rem; border-top: 1px solid var(--border-color); margin-top: 0.75rem; }
.post-actions button { background: none; border: none; color: var(--text-muted); font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 0.4rem; padding: 0.4rem 0.8rem; border-radius: 8px; font-family: inherit; transition: background 0.2s, color 0.2s; }
.post-actions button:hover { background: rgba(13,148,136,0.08); }
.post-actions button.liked { color: #ef4444; }
.post-actions button.liked i { color: #ef4444; }
.btn-subscribe { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1.2rem; background: transparent; border: 2px solid var(--accent-color); color: var(--accent-color); border-radius: 6px; font-family: inherit; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: 0.3s; }
.btn-subscribe:hover { background: var(--accent-color); color: #fff; }
.blog-filters { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 1rem 0; }
.filter-btn { padding: 0.4rem 1rem; background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); border-radius: 20px; font-family: inherit; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: 0.3s; }
.filter-btn:hover, .filter-btn.active { border-color: var(--accent-color); color: var(--accent-color); background: rgba(13,148,136,0.08); }
.code-tag { color: #f59e0b; font-family: monospace; font-size: 1.1rem; }
.blog-main-title { font-size: 2.5rem; margin: 0.3rem 0 0.5rem; color: var(--text-main); }
.blog-subtitle { color: var(--text-muted); font-size: 1.05rem; }
.logo a { font-size: 1.5rem; font-weight: 700; color: var(--text-main); text-decoration: none; }
.nav-container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; height: 100%; display: flex; justify-content: space-between; align-items: center; }
.nav-links { display: flex; gap: 2rem; list-style: none; }
.nav-link { font-weight: 600; color: var(--text-muted); text-decoration: none; transition: color 0.3s; }
.nav-link:hover, .nav-link.active { color: var(--accent-color); }
.nav-actions { display: flex; align-items: center; gap: 1.5rem; }
#theme-toggle { background: none; border: none; color: var(--text-main); font-size: 1.2rem; cursor: pointer; }
.hamburger { display: none; font-size: 1.5rem; cursor: pointer; color: var(--text-main); }
footer { background-color: #000; padding: 2rem; text-align: center; color: var(--text-muted); }
@media (max-width: 768px) {
    .nav-links { display: none; }
    .hamburger { display: block; }
    .blog-main-title { font-size: 1.8rem; }
    .post-card { padding: 1rem; }
    .post-title { font-size: 1.1rem; }
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── FIREBASE CONFIG ───────────────────────────────────────────
const firebaseConfig = {
    apiKey: "AIzaSyAeYGzHvgOC8mQGI-5dc16I9bBRez_LAcc",
    authDomain: "alphax22.firebaseapp.com",
    projectId: "alphax22",
    storageBucket: "alphax22.firebasestorage.app",
    messagingSenderId: "564241919435",
    appId: "1:564241919435:web:a0146fd9a65f32a1125a4e"
};
// ─────────────────────────────────────────────────────────────

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ── LOAD POSTS ─────────────────────────────────────────────────
async function loadPosts() {
    const feed = document.getElementById('posts-feed');

    try {
        feed.innerHTML = '<div class="loading-spinner"></div>';
        const postsRef = collection(db, 'posts');
        const snapshot = await getDocs(postsRef);

        feed.innerHTML = '';

        if (snapshot.empty) {
            feed.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-terminal"></i>
                    <p>No posts yet. Check back soon.</p>
                </div>
            `;
            return;
        }

        snapshot.forEach(doc => {
            const post = doc.data();
            const card = document.createElement('div');
            card.className = 'post-card';
            card.innerHTML = `
                <div class="post-header">
                    <div class="post-avatar">A</div>
                    <div>
                        <div class="post-author">AlphaX</div>
                        <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;">
                            <span class="post-time">Just now</span>
                            <span class="post-category-tag">${(post.category || 'misc').toUpperCase()}</span>
                        </div>
                    </div>
                </div>
                <div class="post-title">${post.title}</div>
                <div class="post-excerpt">${post.excerpt || post.content?.substring(0, 150) + '...' || ''}</div>
                ${post.imageUrl ? `<div class="post-image"><img src="${post.imageUrl}" alt="${post.title}" loading="lazy"></div>` : ''}
                <div class="post-tags">${(post.tags || []).map(t => `<span class="post-tag">${t}</span>`).join('')}</div>
                <div class="post-actions">
                    <button><i class="far fa-heart"></i> ${post.likes || 0}</button>
                    <button><i class="far fa-comment"></i> ${post.commentCount || 0}</button>
                    <button><i class="fas fa-share-alt"></i></button>
                </div>
            `;
            feed.appendChild(card);
        });

    } catch (err) {
        feed.innerHTML = `
            <div class="empty-state">
                <i class="fas fa-exclamation-triangle"></i>
                <p>Error loading posts: ${err.message}</p>
            </div>
        `;
    }
}

// ── INIT ──────────────────────────────────────────────────────
loadPosts();
</script>
