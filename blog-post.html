<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
    getFirestore, doc, getDoc, updateDoc, increment, onSnapshot,
    collection, addDoc, query, orderBy, serverTimestamp 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyAeYGzHvgOC8mQGI-5dc16I9bBRez_LAcc",
    authDomain: "alphax22.firebaseapp.com",
    projectId: "alphax22",
    storageBucket: "alphax22.firebasestorage.app",
    messagingSenderId: "564241919435",
    appId: "1:564241919435:web:a0146fd9a65f32a1125a4e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const postId = params.get('id');

const loading = document.getElementById('loading');
const content = document.getElementById('post-content');
const notFound = document.getElementById('not-found');

let likeUnsub = null;
let commentUnsub = null;

async function loadPost() {
    if (!postId) {
        loading.style.display = 'none';
        notFound.style.display = 'block';
        return;
    }

    try {
        const docRef = doc(db, 'posts', postId);
        const docSnap = await getDoc(docRef);
        
        if (!docSnap.exists()) {
            loading.style.display = 'none';
            notFound.style.display = 'block';
            return;
        }

        const post = docSnap.data();
        loading.style.display = 'none';
        content.style.display = 'block';
        renderPost(post, postId);
        loadComments(postId);
        
        // ── REAL-TIME LIKE LISTENER (SINGLE SOURCE OF TRUTH) ──
        if (likeUnsub) likeUnsub();
        likeUnsub = onSnapshot(doc(db, 'posts', postId), (snap) => {
            if (snap.exists()) {
                const data = snap.data();
                const likeCount = document.getElementById('like-count');
                const likeBtn = document.getElementById('like-btn');
                
                if (likeCount) {
                    likeCount.textContent = data.likes || 0;
                }
                
                const likedPosts = JSON.parse(localStorage.getItem('liked_posts') || '[]');
                if (likedPosts.includes(postId)) {
                    likeBtn.classList.add('liked');
                    likeBtn.querySelector('i').className = 'fas fa-heart';
                } else {
                    likeBtn.classList.remove('liked');
                    likeBtn.querySelector('i').className = 'far fa-heart';
                }
            }
        });

    } catch (err) {
        loading.innerHTML = `<p style="color:#ef4444;">Error: ${err.message}</p>`;
    }
}

function renderPost(post, id) {
    const likedPosts = JSON.parse(localStorage.getItem('liked_posts') || '[]');
    const isLiked = likedPosts.includes(id);

    content.innerHTML = `
        <a href="blog.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Blog</a>
        <div class="post-card">
            ${post.imageUrl ? `<div class="post-image"><img src="${post.imageUrl}" alt="${post.title}"></div>` : ''}
            <h1 class="post-title">${post.title}</h1>
            <div class="post-meta">${post.category || 'Misc'} • ${post.createdAt ? new Date(post.createdAt.toDate()).toLocaleDateString() : 'Unknown date'}</div>
            <div class="post-tags">${(post.tags || []).map(t => `<span class="post-tag">${t}</span>`).join('')}</div>
            <div class="post-content">${post.content}</div>
            <button class="like-btn ${isLiked ? 'liked' : ''}" id="like-btn" data-id="${id}">
                <i class="${isLiked ? 'fas' : 'far'} fa-heart"></i>
                <span id="like-count">${post.likes || 0}</span> Likes
            </button>
        </div>
        <div class="comments-section">
            <h2>Comments</h2>
            <div class="comment-form">
                <input type="text" id="comment-name" placeholder="Your name" maxlength="50">
                <textarea id="comment-text" placeholder="Write a comment..." rows="3" maxlength="500"></textarea>
                <button id="submit-comment">Post Comment</button>
            </div>
            <div id="comments-list"><div class="loading-spinner"></div></div>
        </div>
    `;

    // ── LIKE / DISLIKE BUTTON ──
    const likeBtn = document.getElementById('like-btn');

    likeBtn.addEventListener('click', async function() {
        const id = this.dataset.id;
        let likedPosts = JSON.parse(localStorage.getItem('liked_posts') || '[]');
        const isCurrentlyLiked = likedPosts.includes(id);
        
        if (isCurrentlyLiked) {
            // DISLIKE
            likedPosts = likedPosts.filter(p => p !== id);
            localStorage.setItem('liked_posts', JSON.stringify(likedPosts));
            // Toggle visual state immediately for smoothness, let onSnapshot lock down precision numbers
            this.classList.remove('liked');
            this.querySelector('i').className = 'far fa-heart';
            await updateDoc(doc(db, 'posts', id), { likes: increment(-1) });
        } else {
            // LIKE
            likedPosts.push(id);
            localStorage.setItem('liked_posts', JSON.stringify(likedPosts));
            this.classList.add('liked');
            this.querySelector('i').className = 'fas fa-heart';
            await updateDoc(doc(db, 'posts', id), { likes: increment(1) });
        }
    });

    // ── COMMENT ──
    document.getElementById('submit-comment').addEventListener('click', async function() {
        const name = document.getElementById('comment-name').value.trim() || 'Anonymous';
        const text = document.getElementById('comment-text').value.trim();
        if (!text) { alert('Write something first!'); return; }
        this.disabled = true;
        this.textContent = 'Posting...';
        try {
            await addDoc(collection(db, 'posts', id, 'comments'), {
                name, text, createdAt: serverTimestamp()
            });
            await updateDoc(doc(db, 'posts', id), {
                commentCount: increment(1)
            });
            document.getElementById('comment-text').value = '';
            this.textContent = 'Post Comment';
            this.disabled = false;
        } catch (err) {
            alert('Error: ' + err.message);
            this.textContent = 'Post Comment';
            this.disabled = false;
        }
    });
}

function loadComments(postId) {
    const q = query(collection(db, 'posts', postId, 'comments'), orderBy('createdAt', 'desc'));
    if (commentUnsub) commentUnsub();
    commentUnsub = onSnapshot(q, (snapshot) => {
        const list = document.getElementById('comments-list');
        if (snapshot.empty) {
            list.innerHTML = '<p class="no-comments">No comments yet. Be the first!</p>';
            return;
        }
        list.innerHTML = '';
        snapshot.forEach(doc => {
            const comment = doc.data();
            const div = document.createElement('div');
            div.className = 'comment-item';
            div.innerHTML = `
                <div class="comment-avatar">${(comment.name || 'A')[0].toUpperCase()}</div>
                <div>
                    <span class="comment-author">${comment.name || 'Anonymous'}</span>
                    <span class="comment-time">${comment.createdAt ? new Date(comment.createdAt.toDate()).toLocaleDateString() : 'Just now'}</span>
                    <p class="comment-text">${comment.text}</p>
                </div>
            `;
            list.appendChild(div);
        });
    });
}

// ── THEME / NAV ──
const themeToggle = document.getElementById('theme-toggle');
const html = document.documentElement;
const saved = localStorage.getItem('theme') || 'dark';
html.setAttribute('data-theme', saved);
themeToggle.innerHTML = saved === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
themeToggle.addEventListener('click', () => {
    const cur = html.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    themeToggle.innerHTML = next === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
});

document.getElementById('hamburger').addEventListener('click', () => {
    document.getElementById('nav-links').classList.toggle('active');
});

loadPost();
                    </script>
