<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaX | Post</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        :root { --bg-color: #0a0a0a; --bg-alt: #111; --card-bg: #151515; --text-main: #f8fafc; --text-muted: #a1a1aa; --accent-color: #0d9488; --border-color: #27272a; }
        [data-theme="light"] { --bg-color: #fff; --bg-alt: #f8f9fa; --card-bg: #fff; --text-main: #1f2937; --text-muted: #4b5563; --border-color: #e5e7eb; }
        body { font-family: 'Inter', sans-serif; color: var(--text-main); background: var(--bg-color); margin: 0; padding: 0; transition: 0.3s; }
        .post-container { max-width: 780px; margin: 0 auto; padding: 2rem 1rem; }
        .post-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 2rem; margin-bottom: 2rem; }
        .post-title { font-size: 2rem; font-weight: 800; color: var(--text-main); }
        .post-meta { color: var(--text-muted); font-size: 0.9rem; margin: 0.5rem 0; }
        .post-content { color: var(--text-muted); font-size: 1rem; line-height: 1.8; margin: 1.5rem 0; white-space: pre-wrap; }
        .post-image { border-radius: 12px; overflow: hidden; margin: 1rem 0; }
        .post-image img { width: 100%; max-height: 500px; object-fit: cover; }
        .post-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 1rem 0; }
        .post-tag { font-size: 0.8rem; padding: 0.2rem 0.8rem; border-radius: 4px; background: rgba(13,148,136,0.1); color: var(--accent-color); border: 1px solid rgba(13,148,136,0.2); }
        .like-btn { background: none; border: none; color: var(--text-muted); font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border-radius: 8px; transition: 0.3s; font-family: inherit; }
        .like-btn:hover { background: rgba(13,148,136,0.1); }
        .like-btn.liked { color: #ef4444; }
        .like-btn.liked i { color: #ef4444; }
        .comments-section { margin-top: 2rem; border-top: 1px solid var(--border-color); padding-top: 2rem; }
        .comment-form { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 2rem; }
        .comment-form input, .comment-form textarea { padding: 0.75rem 1rem; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-main); font-family: inherit; }
        .comment-form button { padding: 0.6rem 1.5rem; background: var(--accent-color); color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; align-self: flex-end; transition: 0.3s; }
        .comment-form button:hover { background: #0f766e; }
        .comment-form button:disabled { opacity: 0.6; cursor: not-allowed; }
        .comment-item { display: flex; gap: 0.75rem; padding: 0.75rem 0; border-bottom: 1px solid var(--border-color); }
        .comment-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent-color); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; flex-shrink: 0; }
        .comment-author { font-weight: 700; color: var(--text-main); }
        .comment-time { color: var(--text-muted); font-size: 0.75rem; margin-left: 0.5rem; }
        .comment-text { color: var(--text-muted); margin: 0.25rem 0; word-break: break-word; }
        .no-comments { color: var(--text-muted); text-align: center; padding: 2rem; }
        .back-link { display: inline-block; margin-bottom: 1.5rem; color: var(--text-muted); text-decoration: none; }
        .back-link:hover { color: var(--accent-color); }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid var(--border-color); border-top-color: var(--accent-color); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 2rem auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .post-not-found { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
        .post-not-found i { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
        .nav-container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; height: 80px; }
        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-link { font-weight: 600; color: var(--text-muted); text-decoration: none; }
        .nav-link:hover, .nav-link.active { color: var(--accent-color); }
        .logo a { font-size: 1.5rem; font-weight: 700; color: var(--text-main); text-decoration: none; }
        .hamburger { display: none; font-size: 1.5rem; cursor: pointer; }
        @media (max-width: 768px) { .nav-links { display: none; } .hamburger { display: block; } }
        footer { background: #000; padding: 2rem; text-align: center; color: var(--text-muted); }
        .like-btn { transition: all 0.2s; }
        .like-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <header>
        <nav class="nav-container">
            <div class="logo"><a href="index.html">0xAlpha22</a></div>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html#home" class="nav-link">Home</a></li>
                <li><a href="index.html#about" class="nav-link">About</a></li>
                <li><a href="projects.html" class="nav-link">Projects</a></li>
                <li><a href="https://alphalabs-22.web.app/index.html" class="nav-link">Writeups</a></li>
                <li><a href="certificates.html" class="nav-link">Certificates</a></li>
                <li><a href="blog.html" class="nav-link">Blog</a></li>
                <li><a href="resume.html" class="nav-link">Resume</a></li>
                <li><a href="index.html#contact" class="nav-link">Contact</a></li>
            </ul>
            <div class="nav-actions">
                <button id="theme-toggle"><i class="fas fa-moon"></i></button>
                <div class="hamburger" id="hamburger"><i class="fas fa-bars"></i></div>
            </div>
        </nav>
    </header>

    <main>
        <div class="post-container">
            <div id="loading"><div class="loading-spinner"></div></div>
            <div id="post-content" style="display:none;"></div>
            <div id="not-found" style="display:none;" class="post-not-found">
                <i class="fas fa-terminal"></i>
                <h2>Post not found</h2>
                <a href="blog.html" class="back-link">← Back to Blog</a>
            </div>
        </div>
    </main>

    <footer><p>© 2026 AlphaX. All rights reserved.</p></footer>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { 
        getFirestore, doc, getDoc, updateDoc, increment, onSnapshot,
        collection, addDoc, query, orderBy, serverTimestamp 
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // ── XSS PROTECTION ──
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
    const firebaseConfig = {
        apiKey: "AIzaSyAeYGzHvgOC8mQGI-5dc16I9bBRez_LAcc",
        authDomain: "alphax22.firebaseapp.com",
        projectId: "alphax22",
        storageBucket: "alphax22.firebasestorage.app",
        messagingSenderId: "564241919435",
        appId: "1:564241919435:web:a0146fd9a65f32a1125a4e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    const postId = params.get('id');

    const loading = document.getElementById('loading');
    const content = document.getElementById('post-content');
    const notFound = document.getElementById('not-found');

    let likeUnsub = null;
    let commentUnsub = null;

    async function loadPost() {
        if (!postId) {
            loading.style.display = 'none';
            notFound.style.display = 'block';
            return;
        }

        try {
            const docRef = doc(db, 'posts', postId);
            const docSnap = await getDoc(docRef);
            
            if (!docSnap.exists()) {
                loading.style.display = 'none';
                notFound.style.display = 'block';
                return;
            }

            const post = docSnap.data();
            loading.style.display = 'none';
            content.style.display = 'block';
            renderPost(post, postId);
            loadComments(postId);
            
            // ── REAL-TIME SYNCED OBSERVER ──
            if (likeUnsub) likeUnsub();
            likeUnsub = onSnapshot(doc(db, 'posts', postId), (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    const likeCount = document.getElementById('like-count');
                    const likeBtn = document.getElementById('like-btn');
                    
                    if (likeCount) {
                        likeCount.textContent = data.likes || 0;
                    }
                    
                    const likedPosts = JSON.parse(localStorage.getItem('liked_posts') || '[]');
                    if (likedPosts.includes(postId)) {
                        if (likeBtn) likeBtn.classList.add('liked');
                        if (likeBtn) likeBtn.querySelector('i').className = 'fas fa-heart';
                    } else {
                        if (likeBtn) likeBtn.classList.remove('liked');
                        if (likeBtn) likeBtn.querySelector('i').className = 'far fa-heart';
                    }
                }
            });

        } catch (err) {
            loading.innerHTML = `<p style="color:#ef4444;">Error: ${err.message}</p>`;
        }
    }

    function renderPost(post, id) {
        const likedPosts = JSON.parse(localStorage.getItem('liked_posts') || '[]');
        const isLiked = likedPosts.includes(id);

        content.innerHTML = `
            <a href="blog.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Blog</a>
            <div class="post-card">
                ${post.imageUrl ? `<div class="post-image"><img src="${post.imageUrl}" alt="${post.title}"></div>` : ''}
                <h1 class="post-title">${post.title}</h1>
                <div class="post-meta">${post.category || 'Misc'} • ${post.createdAt ? new Date(post.createdAt.toDate()).toLocaleDateString() : 'Unknown date'}</div>
                <div class="post-tags">${(post.tags || []).map(t => `<span class="post-tag">${t}</span>`).join('')}</div>
                <div class="post-content">${post.content}</div>
                <button class="like-btn ${isLiked ? 'liked' : ''}" id="like-btn" data-id="${id}">
                    <i class="${isLiked ? 'fas' : 'far'} fa-heart"></i>
                    <span id="like-count">${post.likes || 0}</span> Likes
                </button>
            </div>
            <div class="comments-section">
                <h2>Comments</h2>
                <div class="comment-form">
                    <input type="text" id="comment-name" placeholder="Your name" maxlength="50">
                    <textarea id="comment-text" placeholder="Write a comment..." rows="3" maxlength="500"></textarea>
                    <button id="submit-comment">Post Comment</button>
                </div>
                <div id="comments-list"><div class="loading-spinner"></div></div>
            </div>
        `;

        const likeBtn = document.getElementById('like-btn');
        likeBtn.addEventListener('click', async function() {
            const id = this.dataset.id;
            let likedPosts = JSON.parse(localStorage.getItem('liked_posts') || '[]');
            const isCurrentlyLiked = likedPosts.includes(id);
            
            if (isCurrentlyLiked) {
                likedPosts = likedPosts.filter(p => p !== id);
                localStorage.setItem('liked_posts', JSON.stringify(likedPosts));
                this.classList.remove('liked');
                this.querySelector('i').className = 'far fa-heart';
                await updateDoc(doc(db, 'posts', id), { likes: increment(-1) });
            } else {
                likedPosts.push(id);
                localStorage.setItem('liked_posts', JSON.stringify(likedPosts));
                this.classList.add('liked');
                this.querySelector('i').className = 'fas fa-heart';
                await updateDoc(doc(db, 'posts', id), { likes: increment(1) });
            }
        });

        document.getElementById('submit-comment').addEventListener('click', async function() {
            const name = document.getElementById('comment-name').value.trim() || 'Anonymous';
            const text = document.getElementById('comment-text').value.trim();
            if (!text) { alert('Write something first!'); return; }
            this.disabled = true;
            this.textContent = 'Posting...';
            try {
                await addDoc(collection(db, 'posts', id, 'comments'), {
                    name, text, createdAt: serverTimestamp()
                });
                await updateDoc(doc(db, 'posts', id), {
                    commentCount: increment(1)
                });
                document.getElementById('comment-text').value = '';
                this.textContent = 'Post Comment';
                this.disabled = false;
            } catch (err) {
                alert('Error: ' + err.message);
                this.textContent = 'Post Comment';
                this.disabled = false;
            }
        });
    }

    function loadComments(postId) {
        const q = query(collection(db, 'posts', postId, 'comments'), orderBy('createdAt', 'desc'));
        if (commentUnsub) commentUnsub();
        commentUnsub = onSnapshot(q, (snapshot) => {
            const list = document.getElementById('comments-list');
            if (!list) return;
            if (snapshot.empty) {
                list.innerHTML = '<p class="no-comments">No comments yet. Be the first!</p>';
                return;
            }
            list.innerHTML = '';
            snapshot.forEach(doc => {
                const comment = doc.data();
                const div = document.createElement('div');
                div.className = 'comment-item';
                div.innerHTML = `
                    <div class="comment-avatar">${(comment.name || 'A')[0].toUpperCase()}</div>
                    <div>
                        <span class="comment-author">${comment.name || 'Anonymous'}</span>
                        <span class="comment-time">${comment.createdAt ? new Date(comment.createdAt.toDate()).toLocaleDateString() : 'Just now'}</span>
                        <p class="comment-text">${comment.text}</p>
                    </div>
                `;
                list.appendChild(div);
            });
        });
    }

    const themeToggle = document.getElementById('theme-toggle');
    const html = document.documentElement;
    const saved = localStorage.getItem('theme') || 'dark';
    html.setAttribute('data-theme', saved);
    themeToggle.innerHTML = saved === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    themeToggle.addEventListener('click', () => {
        const cur = html.getAttribute('data-theme');
        const next = cur === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        themeToggle.innerHTML = next === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    });

    document.getElementById('hamburger').addEventListener('click', () => {
        document.getElementById('nav-links').classList.toggle('active');
    });

    loadPost();
    </script>
</body>
</html>
