<main>

    <!-- Post Article -->

        <div class="post-article-inner section-container">

            <!-- Back Link -->

            <!-- Hero Image -->
            <div class="post-hero-img" id="post-hero-img" style="display:none;">
                <img id="post-img" src="" alt="">
            </div>

            <!-- Post Header -->
            <header class="post-header">
                <div class="post-header-meta">

            </div>

        </div>

<!-- FOOTER -->
<footer>
    <p>© 2026 AlphaX. All rights reserved.</p>
</footer>

<script>
// =============================================
// BLOG POST LOGIC - Reads from db.js
// =============================================

document.addEventListener('DOMContentLoaded', function() {
    loadPost();
});

function loadPost() {
    const params = new URLSearchParams(window.location.search);
    const postId = params.get('id');

    if (!postId) {
        showNotFound();
        return;
    }

    const postsData = typeof posts !== 'undefined' ? posts : [];
    const post = postsData.find(p => p.id === postId);

    if (!post) {
        showNotFound();
        return;
    }

    renderPost(post);
}

function renderPost(post) {
    document.getElementById('post-article').style.display = 'block';

    // Hero image
    if (post.imageUrl && post.imageUrl.trim() !== '') {
        document.getElementById('post-hero-img').style.display = 'block';
        document.getElementById('post-img').src = post.imageUrl;
        document.getElementById('post-img').alt = post.title;
    }

    // Category
    const catEl = document.getElementById('post-category');
    catEl.textContent = (post.category || 'misc').toUpperCase();
    catEl.className = `post-category cat-${post.category || 'misc'}`;

    // Date
    document.getElementById('post-date').textContent = post.date || 'Unknown date';

    // Title
    document.getElementById('post-title').textContent = post.title;

    // Tags
    const tagsEl = document.getElementById('post-tags-full');
    if (post.tags && post.tags.length) {
        tagsEl.innerHTML = post.tags.map(t => `<span class="post-tag">${t}</span>`).join('');
    }

    // Body - support markdown-like formatting
    document.getElementById('post-body').innerHTML = renderContent(post.content);

    // Likes (stored locally)
    const likeCount = document.getElementById('like-count-full');
    likeCount.textContent = post.likes || 0;

    // Like button
    const likeBtn = document.getElementById('like-post-btn');
    const liked = (JSON.parse(localStorage.getItem('liked_posts') || '[]')).includes(post.id);
    if (liked) {
        likeBtn.classList.add('liked');
        likeBtn.querySelector('i').className = 'fas fa-heart';
    }
    likeBtn.addEventListener('click', function() {
        const likedPosts = JSON.parse(localStorage.getItem('liked_posts') || '[]');
        if (likedPosts.includes(post.id)) {
            alert('You already liked this post!');
            return;
        }
        likedPosts.push(post.id);
        localStorage.setItem('liked_posts', JSON.stringify(likedPosts));
        likeBtn.classList.add('liked');
        likeBtn.querySelector('i').className = 'fas fa-heart';
        likeCount.textContent = parseInt(likeCount.textContent) + 1;
    });

    // Share
    document.getElementById('share-post-btn').addEventListener('click', function() {
        const url = window.location.href;
        if (navigator.share) {
            navigator.share({ title: post.title, url });
        } else {
            navigator.clipboard.writeText(url).then(() => alert('✅ Link copied!'));
        }
    });

    // Update page title
    document.title = `AlphaX | ${post.title}`;
}

function renderContent(text) {
    if (!text) return '';
    let html = text
        .replace(/```([\s\S]*?)```/g, (_, c) => `<pre class="code-block"><code>${escapeHtml(c.trim())}</code></pre>`)
        .replace(/`([^`]+)`/g, (_, c) => `<code class="inline-code">${escapeHtml(c)}</code>`)
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/\n/g, '<br>');

    html = html.replace(/(<li>.*?<\/li>)+/gs, '<ul>$&</ul>');
    return `<p>${html}</p>`;
}

function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function showNotFound() {
    document.getElementById('post-not-found').style.display = 'flex';
}

// ── NAV / THEME ───────────────────────────────────────────────
const hamburger = document.getElementById('hamburger');
const navLinks = document.getElementById('nav-links');
hamburger.addEventListener('click', () => navLinks.classList.toggle('active'));

const themeToggle = document.getElementById('theme-toggle');
const html = document.documentElement;
const saved = localStorage.getItem('theme') || 'dark';
html.setAttribute('data-theme', saved);
themeToggle.innerHTML = saved === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
themeToggle.addEventListener('click', () => {
    const cur = html.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    themeToggle.innerHTML = next === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
});
</script>

<!-- Load db.js last -->
<script src="db.js"></script>
</body>
