<!DOCTYPE html>
<html>
<head>
    <title>Firebase Test</title>
</head>
<body>
    <h1>Firebase Test</h1>
    <div id="result">Loading...</div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAeYGzHvgOC8mQGI-5dc16I9bBRez_LAcc",
        authDomain: "alphax22.firebaseapp.com",
        projectId: "alphax22",
        storageBucket: "alphax22.firebasestorage.app",
        messagingSenderId: "564241919435",
        appId: "1:564241919435:web:a0146fd9a65f32a1125a4e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function testFirebase() {
        try {
            document.getElementById('result').textContent = 'Connecting...';
            const postsRef = collection(db, 'posts');
            const snapshot = await getDocs(postsRef);
            document.getElementById('result').textContent = '✅ Success! Posts found: ' + snapshot.size;
            snapshot.forEach(doc => {
                const p = document.createElement('p');
                p.textContent = '📝 ' + doc.data().title;
                document.body.appendChild(p);
            });
        } catch (err) {
            document.getElementById('result').textContent = '❌ Error: ' + err.message;
        }
    }

    testFirebase();
    </script>
</body>
</html>
